# Spend Jot — Render Blueprint (Infrastructure as Code).
#
# Render reads this file when you create a "Blueprint" from the GitHub repo and
# provisions both services. Secrets (DATABASE_URL, JWT_SECRET_KEY) are marked
# `sync: false` and must be filled in the Render dashboard — they are never
# committed to git.
#
# Topology:
#   Frontend (Next.js) is hosted on VERCEL (spendjot.vercel.app); it proxies
#   /api/* to this Render backend. Render runs only the API now.
#   spendjot-api  (FastAPI)  → talks to Supabase Postgres
#
services:
  # ---------------- Backend API (FastAPI) ----------------
  - type: web
    name: spendjot-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    region: singapore
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Supabase Postgres connection string (asyncpg). SET IN DASHBOARD.
      # Use the Supabase "Session pooler" URI, converted to +asyncpg, e.g.:
      #   postgresql+asyncpg://postgres.<ref>:<encoded-pw>@aws-0-<region>.pooler.supabase.com:5432/postgres
      - key: DATABASE_URL
        sync: false
      # Auto-generated, stable secret for signing JWTs.
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_DAYS
        value: "10"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: MAX_FAILED_LOGINS
        value: "5"
      - key: LOCKOUT_MINUTES
        value: "5"
      # Behind Render's HTTPS, so the refresh cookie must be Secure.
      - key: COOKIE_SECURE
        value: "true"
      # Encrypt the connection to Supabase's pooler (sslmode=require).
      - key: DB_SSL
        value: "true"
      # Don't seed the demo user/expenses in production (categories still come
      # from the Alembic migration). Flip to "true" for a quick populated demo.
      - key: SEED_DEMO_DATA
        value: "false"
      # Not strictly needed (same-origin via the Vercel proxy) but set for safety.
      - key: CORS_ORIGINS
        value: https://spendjot.vercel.app
      # Public URL of the site (Vercel) — used in the welcome email (logo + link).
      - key: FRONTEND_URL
        value: https://spendjot.vercel.app
      # Outgoing email (welcome message on signup) via the Resend HTTP API.
      # Render blocks outbound SMTP ports (25/465/587), so SMTP won't work here —
      # Resend's HTTPS API is used instead. The API key is a secret → set it in
      # the dashboard. Emails are simply skipped if the key is blank.
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_FROM_EMAIL
        value: noreply@spendjot.com
      - key: SMTP_FROM_NAME
        value: Spend Jot

  # The frontend now lives on Vercel (Root Directory = frontend). It reverse-
  # proxies /api/* to this API via the default target baked into next.config.mjs
  # (override with a BACKEND_INTERNAL_URL env var in the Vercel project if needed).
