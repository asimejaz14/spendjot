# Spend Jot — full stack.
#
#   Local Postgres (offline dev):
#       docker compose --profile local-db up --build
#
#   Supabase / external DB (set DATABASE_URL in .env first):
#       docker compose up --build
#
services:
  db:
    image: postgres:16-alpine
    profiles: ["local-db"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-spendjot}
    ports:
      - "5432:5432"
    volumes:
      - spendjot_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/spendjot}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-please}
      ACCESS_TOKEN_EXPIRE_DAYS: ${ACCESS_TOKEN_EXPIRE_DAYS:-10}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      MAX_FAILED_LOGINS: ${MAX_FAILED_LOGINS:-5}
      LOCKOUT_MINUTES: ${LOCKOUT_MINUTES:-5}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
        required: false

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  spendjot_db:
